name: Deploy to Strato (Test)

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Strato
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy via rsync
        run: |
          sshpass -p "${{ secrets.STRATO_PASSWORD }}" rsync -avz \
            -e "ssh -o StrictHostKeyChecking=no -p 22" \
            dist/ \
            ${{ secrets.STRATO_USER }}@${{ secrets.STRATO_HOST }}:/